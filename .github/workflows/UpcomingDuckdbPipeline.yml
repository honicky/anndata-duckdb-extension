#
# This workflow builds the extension against the upcoming DuckDB release
# (the duckdb/main branch) so that API breakages are surfaced before they
# ship in a stable release.
#
# Cadence: runs daily, plus on demand via workflow_dispatch.
# When the build or code-quality job fails, the `report-failure` job opens
# (or refreshes) a tracking issue labeled `duckdb-main-broken`. When a later
# run succeeds, the `clear-failure` job auto-closes any open tracking issue.
#
# Per https://duckdb.org/community_extensions/development, extensions should
# track both the current stable release and the upcoming release on `main`.
#
name: Upcoming DuckDB Pipeline (main)
on:
  schedule:
    # Daily at 06:00 UTC. DuckDB main lands new commits across the day so
    # any time is fine; pre-business-hours UTC keeps results fresh by 9am EU.
    - cron: '0 6 * * *'
  workflow_dispatch:
  # Also run when the workflow file itself is edited so changes can be tested.
  push:
    branches: [main]
    paths:
      - '.github/workflows/UpcomingDuckdbPipeline.yml'

# Allow only one concurrent run of this workflow; cancel previous in-progress.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  duckdb-main-build:
    name: Build against duckdb/main
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: anndata
      opt_in_archs: 'linux_amd64_musl'

  duckdb-main-code-quality:
    name: Code quality vs duckdb/main
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: anndata
      format_checks: 'format;tidy'

  report-failure:
    name: Open / update tracking issue on failure
    needs: [duckdb-main-build, duckdb-main-code-quality]
    if: always() && (needs.duckdb-main-build.result == 'failure' || needs.duckdb-main-code-quality.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Resolve duckdb/main commit
        id: duckdb_sha
        run: |
          SHA=$(git ls-remote https://github.com/duckdb/duckdb.git refs/heads/main | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.duckdb-main-build.result }}
          QUALITY_RESULT: ${{ needs.duckdb-main-code-quality.result }}
          DUCKDB_SHA: ${{ steps.duckdb_sha.outputs.sha }}
          DUCKDB_SHORT: ${{ steps.duckdb_sha.outputs.short }}
        with:
          script: |
            const label = 'duckdb-main-broken';
            const title = 'Upcoming DuckDB build failure (duckdb/main)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const duckdbSha = process.env.DUCKDB_SHA;
            const duckdbShort = process.env.DUCKDB_SHORT;
            const buildResult = process.env.BUILD_RESULT;
            const qualityResult = process.env.QUALITY_RESULT;
            const failedJobs = [];
            if (buildResult === 'failure') failedJobs.push('`duckdb-main-build`');
            if (qualityResult === 'failure') failedJobs.push('`duckdb-main-code-quality`');

            const body = [
              `The daily build against \`duckdb/main\` failed.`,
              ``,
              `- Failed jobs: ${failedJobs.join(', ')}`,
              `- Run: ${runUrl}`,
              `- DuckDB \`main\` ref: [\`${duckdbShort}\`](https://github.com/duckdb/duckdb/commit/${duckdbSha})`,
              `- Triggered by: \`${context.eventName}\``,
              ``,
              `When the next scheduled run passes, this issue will be closed automatically.`,
              ``,
              `---`,
              ``,
              `@claude please investigate the failed run linked above and open a pull request that fixes the API breakage so the extension builds against \`duckdb/main\`. Keep changes minimal and preserve compatibility with the current stable release (\`v1.5.x\`). Reproduce locally with:`,
              ``,
              '```',
              'git -C duckdb fetch origin main && git -C duckdb checkout origin/main',
              'git -C extension-ci-tools fetch origin main && git -C extension-ci-tools checkout origin/main',
              'rm -rf build/release && uv run make',
              '```',
              ``,
              `> Note: the \`@claude\` mention only triggers a fix PR if the [Claude GitHub App](https://github.com/apps/claude) is installed on this repository. Otherwise this is a tracking issue for a human to address.`,
            ].join('\n');

            // Find an existing open tracking issue (label-based, not title-based).
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            // Ensure the label exists (create if missing).
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'b60205',
                  description: 'Tracking issue: extension fails to build against duckdb/main',
                });
              } else {
                throw e;
              }
            }

            if (existing.length === 0) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
              core.notice(`Opened tracking issue #${created.data.number}`);
            } else {
              const issue = existing[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Still failing on a new run.\n\n${body}`,
              });
              core.notice(`Updated existing tracking issue #${issue.number}`);
            }

  clear-failure:
    name: Close tracking issue on success
    needs: [duckdb-main-build, duckdb-main-code-quality]
    if: needs.duckdb-main-build.result == 'success' && needs.duckdb-main-code-quality.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Close any open tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'duckdb-main-broken';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            for (const issue of open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Build against \`duckdb/main\` is green again. Closing.\n\nRun: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.notice(`Closed tracking issue #${issue.number}`);
            }
