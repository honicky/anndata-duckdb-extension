#
# Single workflow that tracks the upcoming DuckDB release AND monitors the
# stable upstream ecosystem. (Consolidates the former UpcomingDuckdbPipeline +
# MonitorUpstream workflows.)
#
# Per https://duckdb.org/community_extensions/development, an extension
# should maintain TWO branches:
#   * `main` — builds against the current stable DuckDB release
#               (the descriptor's `ref` in duckdb/community-extensions)
#   * `main-distribution` — builds against `duckdb/main`
#
# UPCOMING-RELEASE tracking (runs on schedule, manual dispatch, and pushes to
# `main-distribution`):
#   1. Bootstraps `main-distribution` from `main` if it doesn't exist yet,
#      and otherwise merges `main` into `main-distribution` daily so stable
#      changes flow forward automatically.
#      - Clean merge → pushed to origin
#      - Conflict   → `next-merge-conflict` issue opened (with @claude mention)
#   2. Builds the resulting `main-distribution` against `duckdb/main`.
#   3. On build/code-quality failure → opens (or refreshes) a `duckdb-main-broken`
#      tracking issue. The body @-mentions Claude so that, if the Claude GitHub
#      App is installed, an automatic fix-PR against `main-distribution` is
#      proposed. On the next green run the issue is auto-closed.
#
# UPSTREAM MONITORING (runs on schedule / manual dispatch only — skipped on
# `main-distribution` pushes):
#   4. New stable DuckDB release detection → `new-duckdb-release` issue with an
#      upgrade checklist; auto-closes once our pin catches up.
#   5. Stable CI health: re-runs the full stable build matrix against
#      `extension-ci-tools@main` to catch upstream CI-tooling regressions →
#      `ci-upstream-regression` issue; auto-closes when green again.
#   6. Community-extensions descriptor freshness: compares the published
#      `version` / `ref` at duckdb/community-extensions against our latest
#      release tag → `community-ext-stale` issue with a ready-to-paste diff;
#      auto-closes when upstream catches up.
#
name: Upcoming DuckDB Pipeline (main)
on:
  schedule:
    # Daily at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
  # Re-run when main-distribution itself changes (e.g. a fix pushed by hand).
  push:
    branches: [main-distribution]

# Single-flight: don't pile up scheduled runs while one is in progress.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: Sync main → main-distribution
    # Skip on push to main-distribution (the push itself is the merge result;
    # re-running sync would be a no-op or a loop).
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    outputs:
      head_sha: ${{ steps.sync.outputs.head_sha }}
      conflict: ${{ steps.sync.outputs.conflict }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap or fast-forward main-distribution
        id: sync
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git ls-remote --exit-code --heads origin main-distribution >/dev/null; then
            echo "main-distribution does not exist on origin; bootstrapping from main"
            git fetch origin main
            git checkout -B main-distribution origin/main
            git push origin main-distribution
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "conflict=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main main-distribution
          git checkout main-distribution
          git reset --hard origin/main-distribution

          # If main-distribution is already up to date with main, nothing to do.
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "main-distribution already contains all of main; skipping merge"
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "conflict=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge --no-edit --no-ff origin/main -m "chore: merge main into main-distribution"; then
            git push origin main-distribution
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git merge --abort || true
            echo "head_sha=$(git rev-parse origin/main-distribution)" >> "$GITHUB_OUTPUT"
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open conflict tracking issue
        if: steps.sync.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'next-merge-conflict';
            const title = 'Merge `main` → `main-distribution` failed (conflict)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const mainSha = await github.rest.repos.getBranch({
              owner: context.repo.owner, repo: context.repo.repo, branch: 'main'
            }).then(r => r.data.commit.sha).catch(() => null);
            const distSha = await github.rest.repos.getBranch({
              owner: context.repo.owner, repo: context.repo.repo, branch: 'main-distribution'
            }).then(r => r.data.commit.sha).catch(() => null);

            const body = [
              `Auto-merge from \`main\` into \`main-distribution\` could not complete cleanly.`,
              ``,
              `- main: \`${mainSha}\``,
              `- main-distribution: \`${distSha}\``,
              `- Run: ${runUrl}`,
              ``,
              `@claude please resolve the merge conflict by checking out \`main-distribution\`, ` +
              `merging \`origin/main\` into it, hand-resolving the conflicting hunks (typically the ` +
              `extension code that diverged to support \`duckdb/main\` APIs), and pushing the result. ` +
              `Reproduce with:`,
              ``,
              '```',
              'git fetch origin main main-distribution',
              'git checkout main-distribution && git reset --hard origin/main-distribution',
              'git merge origin/main',
              '```',
              ``,
              `> The \`@claude\` mention only triggers an automated PR if the [Claude GitHub App](https://github.com/apps/claude) is installed.`,
            ].join('\n');

            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: 'fbca04',
                  description: 'Tracking issue: main → main-distribution merge has a conflict',
                });
              } else { throw e; }
            }

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label, per_page: 100,
            });

            if (open.length === 0) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [label],
              });
              core.notice(`Opened conflict tracking issue #${created.data.number}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number,
                body: `Still conflicting on a new run.\n\n${body}`,
              });
              core.notice(`Updated existing conflict issue #${open[0].number}`);
            }

      - name: Fail run if merge conflict
        if: steps.sync.outputs.conflict == 'true'
        run: |
          echo "::error::Merge conflict between main and main-distribution; tracking issue opened. Skipping build."
          exit 1

  duckdb-main-build:
    name: Build against duckdb/main
    needs: sync
    # Run when sync succeeded (clean merge or already up to date) OR when this
    # workflow was triggered by a direct push to main-distribution (sync was skipped).
    if: always() && (needs.sync.result == 'success' || needs.sync.result == 'skipped')
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: anndata
      opt_in_archs: 'linux_amd64_musl'
      override_repository: ${{ github.repository }}
      override_ref: main-distribution

  duckdb-main-code-quality:
    name: Code quality vs duckdb/main
    needs: sync
    if: always() && (needs.sync.result == 'success' || needs.sync.result == 'skipped')
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: anndata
      format_checks: 'format;tidy'
      override_repository: ${{ github.repository }}
      override_ref: main-distribution

  report-failure:
    name: Open / update tracking issue on build failure
    needs: [duckdb-main-build, duckdb-main-code-quality]
    if: always() && (needs.duckdb-main-build.result == 'failure' || needs.duckdb-main-code-quality.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Resolve duckdb/main commit
        id: duckdb_sha
        run: |
          SHA=$(git ls-remote https://github.com/duckdb/duckdb.git refs/heads/main | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.duckdb-main-build.result }}
          QUALITY_RESULT: ${{ needs.duckdb-main-code-quality.result }}
          DUCKDB_SHA: ${{ steps.duckdb_sha.outputs.sha }}
          DUCKDB_SHORT: ${{ steps.duckdb_sha.outputs.short }}
        with:
          script: |
            const label = 'duckdb-main-broken';
            const title = 'Upcoming DuckDB build failure (`main-distribution` vs duckdb/main)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const failedJobs = [];
            if (process.env.BUILD_RESULT === 'failure') failedJobs.push('`duckdb-main-build`');
            if (process.env.QUALITY_RESULT === 'failure') failedJobs.push('`duckdb-main-code-quality`');

            const body = [
              `The build of \`main-distribution\` against \`duckdb/main\` failed.`,
              ``,
              `- Failed jobs: ${failedJobs.join(', ')}`,
              `- Run: ${runUrl}`,
              `- DuckDB \`main\` ref: [\`${process.env.DUCKDB_SHORT}\`](https://github.com/duckdb/duckdb/commit/${process.env.DUCKDB_SHA})`,
              `- Triggered by: \`${context.eventName}\``,
              ``,
              `When the next run of this workflow passes, this issue will be closed automatically.`,
              ``,
              `---`,
              ``,
              `@claude please investigate the failed run linked above and open a pull request **against the \`main-distribution\` branch** that fixes the API breakage. Keep the change minimal and isolated to \`main-distribution\` (do not touch \`main\` unless the fix is also valid against the current stable DuckDB release). Reproduce locally with:`,
              ``,
              '```',
              'git fetch origin main-distribution',
              'git checkout main-distribution',
              'git -C duckdb fetch origin main && git -C duckdb checkout origin/main',
              'rm -rf build/release && uv run make',
              '```',
              ``,
              `> The \`@claude\` mention only triggers an automated PR if the [Claude GitHub App](https://github.com/apps/claude) is installed.`,
            ].join('\n');

            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: 'b60205',
                  description: 'Tracking issue: extension fails to build against duckdb/main',
                });
              } else { throw e; }
            }

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label, per_page: 100,
            });

            if (open.length === 0) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [label],
              });
              core.notice(`Opened tracking issue #${created.data.number}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number,
                body: `Still failing on a new run.\n\n${body}`,
              });
              core.notice(`Updated existing tracking issue #${open[0].number}`);
            }

  clear-failure:
    name: Close build-failure tracking issue on success
    needs: [duckdb-main-build, duckdb-main-code-quality]
    if: needs.duckdb-main-build.result == 'success' && needs.duckdb-main-code-quality.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Close any open tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'duckdb-main-broken';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label, per_page: 100,
            });
            for (const issue of open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `Build against \`duckdb/main\` is green again. Closing.\n\nRun: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.notice(`Closed tracking issue #${issue.number}`);
            }

  # ── Monitor 1: new stable DuckDB release detection ──────────────────
  # Monitoring jobs run on schedule / manual dispatch only, never on a
  # main-distribution push (which is about the upcoming build, not stable).
  check-release:
    name: Check for new DuckDB release
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      current: ${{ steps.versions.outputs.current }}
      latest: ${{ steps.versions.outputs.latest }}
      update_available: ${{ steps.versions.outputs.update_available }}
    steps:
      - uses: actions/checkout@v4

      - name: Compare versions
        id: versions
        run: |
          set -eo pipefail
          CURRENT=$(grep -m1 'duckdb_version:' .github/workflows/MainDistributionPipeline.yml \
            | sed 's/.*duckdb_version: *//' | tr -d "'\"")
          LATEST=$(curl -sf https://api.github.com/repos/duckdb/duckdb/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "update_available=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_available=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Current: ${CURRENT}, Latest: ${LATEST}"

      - name: Open or close release tracking issue
        uses: actions/github-script@v7
        env:
          CURRENT: ${{ steps.versions.outputs.current }}
          LATEST: ${{ steps.versions.outputs.latest }}
          UPDATE: ${{ steps.versions.outputs.update_available }}
        with:
          script: |
            const label = 'new-duckdb-release';
            const current = process.env.CURRENT;
            const latest = process.env.LATEST;
            const updateAvailable = process.env.UPDATE === 'true';

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: label
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: '1d76db',
                  description: 'A new DuckDB stable release is available',
                });
              } else { throw e; }
            }

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label, per_page: 100,
            });

            if (!updateAvailable) {
              for (const issue of open) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `We are now on \`${current}\` which matches the latest release. Closing.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: 'closed',
                });
              }
              return;
            }

            const title = `New DuckDB release available: ${latest}`;
            const body = [
              `A new DuckDB stable release **${latest}** is available (we are on \`${current}\`).`,
              ``,
              `### Upgrade checklist`,
              ``,
              '```bash',
              `# 1. Update DuckDB submodule`,
              `cd duckdb && git fetch origin tag ${latest} && git checkout ${latest} && cd ..`,
              ``,
              `# 2. Update extension-ci-tools`,
              `cd extension-ci-tools && git fetch origin && git checkout origin/main && cd ..`,
              ``,
              `# 3. Update CI version references`,
              `sed -i "s/duckdb_version: ${current}/duckdb_version: ${latest}/g" .github/workflows/MainDistributionPipeline.yml`,
              `sed -i "s/${current}/${latest}/g" .github/workflows/MainDistributionPipeline.yml`,
              ``,
              `# 4. Clean build and test`,
              `rm -rf build/release && uv run make`,
              `build/release/test/unittest "test/*" --test-dir .`,
              ``,
              `# 5. Quality checks`,
              `uv run make format-fix && uv run make tidy-check`,
              ``,
              `# 6. Commit`,
              `git add duckdb extension-ci-tools .github/workflows/MainDistributionPipeline.yml`,
              `git commit -m "chore: upgrade DuckDB to ${latest}"`,
              '```',
              ``,
              `After merging, update \`extensions/anndata/description.yml\` in [\`duckdb/community-extensions\`](https://github.com/duckdb/community-extensions) with the new \`ref\`.`,
              ``,
              `This issue will close automatically when our CI is updated to \`${latest}\`.`,
            ].join('\n');

            if (open.length === 0) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [label],
              });
              core.notice(`Opened release tracking issue #${created.data.number}`);
            } else {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number, title, body,
              });
              core.notice(`Updated release tracking issue #${open[0].number}`);
            }

  # ── Monitor 2: stable CI health ─────────────────────────────────────
  # Re-run the full stable build matrix against extension-ci-tools@main to
  # surface upstream CI-tooling regressions even without a push. Skipped on
  # main-distribution pushes because check-release (its version source) is.
  stable-build:
    name: Stable CI health
    needs: check-release
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: ${{ needs.check-release.outputs.current }}
      ci_tools_version: main
      extension_name: anndata
      opt_in_archs: 'linux_amd64_musl'

  report-ci-health:
    name: Report CI health
    needs: [check-release, stable-build]
    if: always() && github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or close CI regression issue
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.stable-build.result }}
          DUCKDB_VERSION: ${{ needs.check-release.outputs.current }}
        with:
          script: |
            const label = 'ci-upstream-regression';
            const buildResult = process.env.BUILD_RESULT;
            const duckdbVersion = process.env.DUCKDB_VERSION || 'the pinned stable version';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // stable-build was skipped (e.g. check-release skipped) → nothing to report.
            if (buildResult === 'skipped' || buildResult === 'cancelled' || !buildResult) {
              core.notice(`Stable build result is '${buildResult}'; nothing to report.`);
              return;
            }

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: label
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: 'e4e669',
                  description: 'Upstream CI tooling regression affecting our stable build',
                });
              } else { throw e; }
            }

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label, per_page: 100,
            });

            if (buildResult === 'success') {
              for (const issue of open) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Stable build is green again. The upstream regression has been fixed.\n\nRun: ${runUrl}`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: 'closed',
                });
                core.notice(`Closed CI regression issue #${issue.number}`);
              }
              return;
            }

            const title = 'Stable build failing due to upstream CI tooling regression';
            const body = [
              `The stable build (DuckDB ${duckdbVersion}) is failing while building against \`extension-ci-tools@main\`.`,
              ``,
              `This is **likely not caused by our code** — the failure is probably in the upstream CI tooling ` +
              `(e.g. a runner-image migration in \`duckdb/extension-ci-tools\`). Confirm by checking whether the ` +
              `same commit builds locally against a pinned \`ci_tools_version\`.`,
              ``,
              `- Build result: \`${buildResult}\``,
              `- Run: ${runUrl}`,
              ``,
              `### What to do`,
              ``,
              `- **Wait** for the upstream fix (preferred). This issue will auto-close when the daily health check passes.`,
              `- **Temporary workaround**: pin \`ci_tools_version\` in \`MainDistributionPipeline.yml\` to a known-good commit (a \`revert me\` commit). Revert once upstream is fixed.`,
              ``,
              `This issue is refreshed daily and will close automatically when the build is green.`,
            ].join('\n');

            if (open.length === 0) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [label],
              });
              core.notice(`Opened CI regression issue #${created.data.number}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number,
                body: `Still failing.\n\n- Build result: \`${buildResult}\`\n- Run: ${runUrl}`,
              });
              core.notice(`Updated CI regression issue #${open[0].number}`);
            }

  # ── Monitor 3: community-extensions descriptor freshness ────────────
  # Compares the published version/ref at duckdb/community-extensions against
  # our latest RELEASE TAG (the descriptor's `ref` is pinned to a tag SHA, not
  # a moving branch head).
  check-community-descriptor:
    name: Check community extensions descriptor
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare descriptor vs our tags
        id: descriptor
        run: |
          set -eo pipefail

          # Fetch the upstream descriptor
          HTTP_CODE=$(curl -sf -w '%{http_code}' \
            https://raw.githubusercontent.com/duckdb/community-extensions/main/extensions/anndata/description.yml \
            -o /tmp/descriptor.yml || true)
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "status=not_found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract upstream version and ref
          UPSTREAM_VERSION=$(grep -m1 '^[[:space:]]*version:' /tmp/descriptor.yml | awk '{print $2}')
          UPSTREAM_REF=$(awk '/^repo:/{f=1; next} f && /^[^ ]/{f=0} f && /^[[:space:]]+ref:/{print $2; exit}' /tmp/descriptor.yml)

          # Get our latest tag
          OUR_LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          OUR_LATEST_VERSION=${OUR_LATEST_TAG#v}
          OUR_TAG_SHA=$(git rev-parse "${OUR_LATEST_TAG}^{commit}" 2>/dev/null || echo "")

          echo "upstream_version=${UPSTREAM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "upstream_ref=${UPSTREAM_REF}" >> "$GITHUB_OUTPUT"
          echo "our_version=${OUR_LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "our_tag=${OUR_LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "our_sha=${OUR_TAG_SHA}" >> "$GITHUB_OUTPUT"

          if [ "${UPSTREAM_VERSION}" = "${OUR_LATEST_VERSION}" ] && [ "${UPSTREAM_REF}" = "${OUR_TAG_SHA}" ]; then
            echo "status=in_sync" >> "$GITHUB_OUTPUT"
          else
            echo "status=stale" >> "$GITHUB_OUTPUT"
          fi

          echo "Upstream: v${UPSTREAM_VERSION} (${UPSTREAM_REF})"
          echo "Ours:     ${OUR_LATEST_TAG} (${OUR_TAG_SHA})"

      - name: Open or close descriptor issue
        if: steps.descriptor.outputs.status != 'not_found'
        uses: actions/github-script@v7
        env:
          STATUS: ${{ steps.descriptor.outputs.status }}
          UPSTREAM_VERSION: ${{ steps.descriptor.outputs.upstream_version }}
          UPSTREAM_REF: ${{ steps.descriptor.outputs.upstream_ref }}
          OUR_VERSION: ${{ steps.descriptor.outputs.our_version }}
          OUR_TAG: ${{ steps.descriptor.outputs.our_tag }}
          OUR_SHA: ${{ steps.descriptor.outputs.our_sha }}
        with:
          script: |
            const label = 'community-ext-stale';
            const status = process.env.STATUS;

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: label
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: '0e8a16',
                  description: 'Community extensions descriptor needs updating to our latest release',
                });
              } else { throw e; }
            }

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: label, per_page: 100,
            });

            if (status === 'in_sync') {
              for (const issue of open) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Community extensions descriptor is now up to date (v${process.env.OUR_VERSION}). Closing.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: 'closed',
                });
              }
              core.notice('Descriptor in sync.');
              return;
            }

            const title = `Update community extensions descriptor to ${process.env.OUR_TAG}`;
            const body = [
              `Our latest release is **${process.env.OUR_TAG}** but the community extensions descriptor still has \`${process.env.UPSTREAM_VERSION}\`.`,
              ``,
              `### Update needed`,
              ``,
              `Open a PR in [\`duckdb/community-extensions\`](https://github.com/duckdb/community-extensions) updating \`extensions/anndata/description.yml\`:`,
              ``,
              '```diff',
              `- version: ${process.env.UPSTREAM_VERSION}`,
              `+ version: ${process.env.OUR_VERSION}`,
              ` repo:`,
              `   github: ${context.repo.owner}/${context.repo.repo}`,
              `-  ref: ${process.env.UPSTREAM_REF}`,
              `+  ref: ${process.env.OUR_SHA}`,
              '```',
              ``,
              `This issue will close automatically when the upstream descriptor matches our latest tag.`,
            ].join('\n');

            if (open.length === 0) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [label],
              });
              core.notice(`Opened descriptor issue #${created.data.number}`);
            } else {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number, title, body,
              });
              core.notice(`Updated descriptor issue #${open[0].number}`);
            }
